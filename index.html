<!DOCTYPE html>
<html>
<head>
    <title>Quiz Master</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1, h2 { color: #333; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background: #667eea; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #5a67d8; }
        .error { color: red; background: #fee; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .success { color: green; background: #efe; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .quiz-card { border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin: 15px 0; background: #f9f9f9; }
        .option { display: block; padding: 10px; margin: 5px 0; background: #f0f0f0; border-radius: 8px; cursor: pointer; }
        .option:hover { background: #e0e7ff; }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th, .admin-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .admin-table th { background: #667eea; color: white; }
        .suspend { background: orange; color: white; padding: 5px 10px; margin: 2px; }
        .delete { background: red; color: white; padding: 5px 10px; margin: 2px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .nav button { width: auto; padding: 10px 20px; background: #764ba2; }
        .quiz-option { margin: 8px 0; padding: 10px; background: #f5f5f5; border-radius: 8px; }
        .selected { background: #667eea; color: white; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="loginView">
        <h1>📚 Quiz Master</h1>
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="doLogin()">Login</button>
        <button onclick="showSignup()" style="background:#764ba2">Create Account</button>
        <div id="loginMessage"></div>
    </div>

    <div id="signupView" style="display:none">
        <h2>📝 Sign Up</h2>
        <input type="text" id="signupName" placeholder="Full Name">
        <input type="email" id="signupEmail" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password">
        <button onclick="doSignup()">Sign Up</button>
        <button onclick="showLogin()">Back to Login</button>
        <div id="signupMessage"></div>
    </div>

    <div id="dashboardView" style="display:none">
        <div class="nav">
            <button onclick="showQuizzes()">📝 Quizzes</button>
            <button id="adminBtn" onclick="showAdminPanel()" style="display:none">👑 Admin Panel</button>
            <button onclick="logout()">🚪 Logout</button>
        </div>
        <div id="dashboardContent"></div>
    </div>
</div>

<script>
    // PASTE YOUR WEB APP URL HERE (the full URL ending with /exec)
    const API_URL = "https://script.google.com/macros/s/AKfycbzezrJ3WJ5pjMyO_lpgzNevIHOz6u0K-DNLpbKUmReQB0D3oQ0xvI_iMiYPkxSY-Kgd/exec"
    
    let currentUser = null;
    let currentQuiz = null;
    
    async function callAPI(action, data = {}) {
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action, ...data }),
                headers: { "Content-Type": "application/json" }
            });
            return await response.json();
        } catch(e) {
            console.error("API Error:", e);
            return { success: false, message: "Connection error. Check your URL." };
        }
    }
    
    async function doLogin() {
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;
        const result = await callAPI("login", { email, password });
        
        if (result.success) {
            currentUser = result;
            document.getElementById("loginView").style.display = "none";
            document.getElementById("dashboardView").style.display = "block";
            if (currentUser.role === "admin") {
                document.getElementById("adminBtn").style.display = "inline-block";
            }
            showQuizzes();
        } else {
            document.getElementById("loginMessage").innerHTML = `<div class="error">${result.message}</div>`;
        }
    }
    
    async function doSignup() {
        const name = document.getElementById("signupName").value;
        const email = document.getElementById("signupEmail").value;
        const password = document.getElementById("signupPassword").value;
        const result = await callAPI("signup", { email, password, fullName: name });
        
        if (result.success) {
            document.getElementById("signupMessage").innerHTML = `<div class="success">${result.message}</div>`;
            setTimeout(showLogin, 1500);
        } else {
            document.getElementById("signupMessage").innerHTML = `<div class="error">${result.message}</div>`;
        }
    }
    
    async function showQuizzes() {
        const quizzes = await callAPI("getQuizzes");
        let html = `<h2>Welcome, ${currentUser.fullName || currentUser.email}!</h2>`;
        
        if (quizzes && quizzes.length > 0) {
            quizzes.forEach(quiz => {
                html += `<div class="quiz-card">
                    <h3>📖 ${quiz.title}</h3>
                    <p>${quiz.questions ? quiz.questions.length : 0} questions</p>
                    <button onclick="startQuiz(${quiz.id})">Start Quiz →</button>
                </div>`;
            });
        } else {
            html += `<p>No quizzes available yet.</p>`;
        }
        
        document.getElementById("dashboardContent").innerHTML = html;
    }
    
    async function startQuiz(quizId) {
        const quizzes = await callAPI("getQuizzes");
        const quiz = quizzes.find(q => q.id === quizId);
        if (!quiz) return;
        
        currentQuiz = quiz;
        let html = `<h2>📋 ${quiz.title}</h2>`;
        
        quiz.questions.forEach((q, idx) => {
            html += `<div class="quiz-card">
                <p><strong>${idx + 1}. ${q.text}</strong></p>`;
            q.options.forEach((opt, optIdx) => {
                html += `<label class="quiz-option" onclick="selectOption(${idx}, ${optIdx})">
                    <input type="radio" name="q${idx}" value="${optIdx}" style="margin-right: 10px;"> ${opt}
                </label>`;
            });
            html += `</div>`;
        });
        
        html += `<button onclick="submitQuiz()">✅ Submit Quiz</button>
                 <button onclick="showQuizzes()" style="background:#764ba2">← Back to Quizzes</button>`;
        
        document.getElementById("dashboardContent").innerHTML = html;
        window.selectedAnswers = {};
    }
    
    function selectOption(questionIdx, optionIdx) {
        window.selectedAnswers = window.selectedAnswers || {};
        window.selectedAnswers[questionIdx] = optionIdx;
        
        // Visual feedback
        const labels = document.querySelectorAll('.quiz-option');
        labels.forEach(label => label.classList.remove('selected'));
        event.target.closest('.quiz-option').classList.add('selected');
    }
    
    async function submitQuiz() {
        if (!currentQuiz || !currentQuiz.questions) return;
        
        let score = 0;
        currentQuiz.questions.forEach((q, idx) => {
            const selected = window.selectedAnswers ? window.selectedAnswers[idx] : undefined;
            if (selected !== undefined && selected === q.correct) {
                score++;
            }
        });
        
        await callAPI("saveQuizResult", { 
            email: currentUser.email, 
            quizId: currentQuiz.id, 
            score: score, 
            totalQuestions: currentQuiz.questions.length 
        });
        
        alert(`🎉 You scored ${score} out of ${currentQuiz.questions.length}!`);
        showQuizzes();
    }
    
    async function showAdminPanel() {
        const users = await callAPI("getAllUsers");
        let html = `<h2>👑 Admin Panel</h2>
            <table class="admin-table">
                <tr><th>Email</th><th>Name</th><th>Role</th><th>Status</th><th>Actions</th></tr>`;
        
        if (users && users.length > 0) {
            users.forEach(user => {
                html += `<tr>
                    <td>${user.email}</td>
                    <td>${user.fullName || '-'}</td>
                    <td>${user.role}</td>
                    <td>${user.status}</td>
                    <td>
                        <button class="suspend" onclick="suspendUser('${user.email}')">Suspend</button>
                        <button class="delete" onclick="deleteUser('${user.email}')">Delete</button>
                    </td>
                </tr>`;
            });
        } else {
            html += `<tr><td colspan="5">No users found</td></tr>`;
        }
        html += `</table><button onclick="showQuizzes()" style="margin-top:20px">← Back to Quizzes</button>`;
        document.getElementById("dashboardContent").innerHTML = html;
    }
    
    async function suspendUser(email) {
        if (confirm(`Suspend ${email}?`)) {
            await callAPI("suspendUser", { email });
            showAdminPanel();
        }
    }
    
    async function deleteUser(email) {
        if (confirm(`Delete ${email}? This cannot be undone.`)) {
            await callAPI("deleteUser", { email });
            showAdminPanel();
        }
    }
    
    function showSignup() {
        document.getElementById("loginView").style.display = "none";
        document.getElementById("signupView").style.display = "block";
    }
    
    function showLogin() {
        document.getElementById("signupView").style.display = "none";
        document.getElementById("loginView").style.display = "block";
        document.getElementById("loginMessage").innerHTML = "";
        document.getElementById("signupMessage").innerHTML = "";
    }
    
    function logout() {
        currentUser = null;
        document.getElementById("dashboardView").style.display = "none";
        document.getElementById("loginView").style.display = "block";
        document.getElementById("loginEmail").value = "";
        document.getElementById("loginPassword").value = "";
    }
</script>
</body>
</html>
