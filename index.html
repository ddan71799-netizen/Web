<!DOCTYPE html>
<html>
<head>
    <title>Quiz Master</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1, h2 { color: #333; text-align: center; margin-top: 0; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        input { border: 1px solid #ddd; }
        button { background: #667eea; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #5a67d8; }
        .error { color: red; background: #fee; padding: 10px; border-radius: 8px; margin: 10px 0; text-align: center; }
        .success { color: green; background: #efe; padding: 10px; border-radius: 8px; margin: 10px 0; text-align: center; }
        .admin-btn { background: #764ba2; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #667eea; color: white; }
        .suspend-btn { background: orange; color: white; padding: 5px 10px; margin: 2px; font-size: 12px; }
        .delete-btn { background: red; color: white; padding: 5px 10px; margin: 2px; font-size: 12px; }
        .back-btn { background: #764ba2; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 Quiz Master</h1>
    
    <!-- Login View -->
    <div id="loginView">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="doLogin()">Login</button>
        <button onclick="showSignup()" style="background:#764ba2">Create Account</button>
        <div id="loginMessage"></div>
    </div>
    
    <!-- Signup View -->
    <div id="signupView" style="display:none">
        <h2>Sign Up</h2>
        <input type="text" id="signupName" placeholder="Full Name">
        <input type="email" id="signupEmail" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password">
        <button onclick="doSignup()">Sign Up</button>
        <button onclick="showLogin()" style="background:#764ba2">Back to Login</button>
        <div id="signupMessage"></div>
    </div>
    
    <!-- Dashboard View -->
    <div id="dashboardView" style="display:none">
        <button onclick="logout()" style="background:#764ba2">Logout</button>
        <div id="dashboardContent"></div>
    </div>
</div>

<script>
// ⚠️ IMPORTANT: Replace this URL with your actual Apps Script Web App URL
const API_URL = "https://script.google.com/macros/s/AKfycbzezrJ3WJ5pjMyO_lpgzNevIHOz6u0K-DNLpbKUmReQB0D3oQ0xvI_iMiYPkxSY-Kgd/exec";

let currentUser = null;

async function callAPI(action, data = {}) {
    try {
        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action, ...data }),
            headers: { "Content-Type": "application/json" }
        });
        return await response.json();
    } catch(e) {
        console.error("API Error:", e);
        return { success: false, message: "Connection error. Check your internet and API URL." };
    }
}

async function doLogin() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    
    if (!email || !password) {
        document.getElementById("loginMessage").innerHTML = '<div class="error">Please enter email and password</div>';
        return;
    }
    
    const result = await callAPI("login", { email, password });
    
    if (result.success) {
        currentUser = result;
        document.getElementById("loginView").style.display = "none";
        document.getElementById("dashboardView").style.display = "block";
        
        let adminHtml = "";
        if (result.role === "admin") {
            adminHtml = '<button onclick="showAdminPanel()" class="admin-btn">👑 Admin Panel</button>';
        }
        
        document.getElementById("dashboardContent").innerHTML = `
            <h2>Welcome, ${result.fullName}!</h2>
            <p>Email: ${result.email}</p>
            <p>Role: ${result.role}</p>
            ${adminHtml}
            <p style="margin-top: 20px; color: #667eea;">Quiz feature coming soon!</p>
        `;
    } else {
        document.getElementById("loginMessage").innerHTML = `<div class="error">${result.message}</div>`;
    }
}

async function doSignup() {
    const name = document.getElementById("signupName").value;
    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;
    
    if (!name || !email || !password) {
        document.getElementById("signupMessage").innerHTML = '<div class="error">Please fill all fields</div>';
        return;
    }
    
    const result = await callAPI("signup", { email, password, fullName: name });
    
    if (result.success) {
        document.getElementById("signupMessage").innerHTML = `<div class="success">${result.message}</div>`;
        setTimeout(showLogin, 1500);
    } else {
        document.getElementById("signupMessage").innerHTML = `<div class="error">${result.message}</div>`;
    }
}

async function showAdminPanel() {
    const users = await callAPI("getAllUsers");
    
    if (!users || !users.length) {
        document.getElementById("dashboardContent").innerHTML = '<div class="error">No users found</div>';
        return;
    }
    
    let html = `<h2>👑 Admin Panel</h2>
                <table>
                    <tr>
                        <th>Email</th>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>`;
    
    for (const user of users) {
        html += `<tr>
                    <td>${user.email}</td>
                    <td>${user.fullName || '-'}</td>
                    <td>${user.status}</td>
                    <td>
                        <button class="suspend-btn" onclick="suspendUser('${user.email}')">Suspend</button>
                        <button class="delete-btn" onclick="deleteUser('${user.email}')">Delete</button>
                    </td>
                 </tr>`;
    }
    
    html += `</table>
             <button onclick="location.reload()" class="back-btn">← Back to Dashboard</button>`;
    
    document.getElementById("dashboardContent").innerHTML = html;
}

async function suspendUser(email) {
    if (confirm(`Suspend ${email}?`)) {
        await callAPI("suspendUser", { email });
        showAdminPanel();
    }
}

async function deleteUser(email) {
    if (confirm(`Delete ${email}? This cannot be undone.`)) {
        await callAPI("deleteUser", { email });
        showAdminPanel();
    }
}

function showSignup() {
    document.getElementById("loginView").style.display = "none";
    document.getElementById("signupView").style.display = "block";
    document.getElementById("loginMessage").innerHTML = "";
}

function showLogin() {
    document.getElementById("signupView").style.display = "none";
    document.getElementById("loginView").style.display = "block";
    document.getElementById("loginMessage").innerHTML = "";
    document.getElementById("signupMessage").innerHTML = "";
}

function logout() {
    currentUser = null;
    document.getElementById("dashboardView").style.display = "none";
    document.getElementById("loginView").style.display = "block";
    document.getElementById("loginEmail").value = "";
    document.getElementById("loginPassword").value = "";
}
</script>
</body>
</html>
